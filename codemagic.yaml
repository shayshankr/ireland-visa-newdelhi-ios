workflows:
  ios-release:
    name: Ireland Visa New Delhi - iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos

      - name: Build iOS (no code signing)
        script: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 \
            --build-number=1

    artifacts:
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    # ── To enable App Store publishing, you need: ──────────────────────────────
    # 1. Apple Developer account (developer.apple.com/programs/enroll)
    # 2. In Codemagic Settings > Integrations > Developer Portal > connect Apple ID
    # 3. Add ios_signing section back with distribution_type: app_store
    # 4. Add publishing > app_store_connect section
